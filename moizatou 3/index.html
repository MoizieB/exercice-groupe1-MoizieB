<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>contact form</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <div class="contact-form">
            <h2>Contact Us </h2>
            <form action="#">
                <label for="name">Full Name</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>
                <label for="phone number"> Phone number</label><br>
                <input type="number" id="phone number" name="phone number" placeholder="Enter your phone number" required><br><br>
                <label for="email">Email</label><br>
                <input type="text" id="email" name="email" placeholder="Enter your email" required><br><br>
                <label for="message">Message</label><br>
                <textarea type="text" id="message" name="mesage" placeholder="Enter your message"></textarea><br><br>
            </form>
            <div class="button-container">
                <button>Submit</button> 
            </div>
        </div>
